name: keep-alive-qr
on:
  schedule:
    # cada 10 min, L-V. GitHub usa UTC → 5-19 UTC ≈ 7-20/21 hora de Madrid
    - cron: '*/10 5-19 * * 1-5'
  workflow_dispatch:   # para lanzarlo a mano y probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar Render (espera el cold start)
        run: |
          curl -sS -f --max-time 120 --retry 3 --retry-delay 20 --retry-all-errors \
            https://qr-decode-p1az.onrender.com/ \
            -o /dev/null -w "HTTP %{http_code} en %{time_total}s\n"